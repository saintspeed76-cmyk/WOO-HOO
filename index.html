<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Iron Log</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c0d0e">

<!-- iOS home-screen support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Iron Log">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Archivo:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0d0e; --bg2:#121416; --surface:#17191b; --surface2:#1e2225;
    --line:#2a2f33; --line2:#363c41;
    --text:#ecefe9; --muted:#8a918b; --faint:#565d58;
    --volt:#cdf24a; --volt-dim:#94ad36; --volt-glow:rgba(205,242,74,.18);
    --cyan:#5ad6e0; --cyan-dim:#3a8f96;
    --danger:#ff5d4f; --warn:#ffb03a;
    --r:14px;
    --display:'Oswald',sans-serif; --body:'Archivo',sans-serif; --mono:'Space Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--text);font-family:var(--body);}
  body{
    min-height:100vh;
    background-image:
      linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:46px 46px;background-position:center;background-attachment:fixed;background-color:var(--bg);
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(circle at 80% -10%,var(--volt-glow),transparent 45%),
      radial-gradient(circle at 0% 110%,rgba(90,214,224,.07),transparent 40%),
      linear-gradient(180deg,rgba(12,13,14,.4),rgba(12,13,14,.92));
  }
  .app{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:18px 14px 120px;padding-top:calc(30px + env(safe-area-inset-top, 0px));}

  header{display:flex;flex-direction:column;gap:14px;margin-bottom:18px;}
  .titlebar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
  .brand h1{font-family:var(--display);font-weight:700;font-size:clamp(30px,8vw,46px);line-height:.92;letter-spacing:.5px;text-transform:uppercase;}
  .brand h1 span{color:var(--volt);}
  .brand p{font-size:12px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-top:6px;}
  .hbtns{display:flex;gap:8px;flex-shrink:0;}
  .iconbtn{background:var(--surface);border:1px solid var(--line);color:var(--muted);width:42px;height:42px;border-radius:11px;font-size:17px;cursor:pointer;display:grid;place-items:center;transition:.15s;}
  .iconbtn:hover{border-color:var(--volt-dim);color:var(--volt);}
  .iconbtn:active{transform:scale(.93);}
  .menuwrap{position:relative;}
  .menudrop{
    position:absolute;top:calc(100% + 8px);right:0;z-index:35;min-width:208px;
    background:var(--surface2);border:1px solid var(--line2);border-radius:13px;
    padding:6px;box-shadow:0 16px 40px -10px rgba(0,0,0,.55);
    display:none;flex-direction:column;gap:2px;
  }
  .menudrop.open{display:flex;animation:menuopen .16s ease;}
  @keyframes menuopen{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .menuitem{
    display:flex;align-items:center;gap:11px;width:100%;text-align:left;
    background:transparent;border:none;color:var(--text);padding:11px 12px;border-radius:9px;
    font-family:var(--body);font-size:13.5px;cursor:pointer;transition:.12s;
  }
  .menuitem svg{flex-shrink:0;stroke:var(--muted);}
  .menuitem:hover{background:var(--bg2);}
  .menuitem:hover svg{stroke:var(--volt);}
  .menuitem.active{color:var(--volt);}
  .menuitem.active svg{stroke:var(--volt);}
  .menuitem.danger:hover{background:rgba(255,93,79,.1);}
  .menuitem.danger:hover svg{stroke:var(--danger);}
  .menudivider{height:1px;background:var(--line);margin:5px 4px;}
  .menuunit{display:flex;align-items:center;justify-content:space-between;padding:6px 12px 8px;}
  .munlab{font-family:var(--display);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--faint);}
  .unitswitch{display:flex;background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:2px;gap:2px;}
  .unitopt{font-family:var(--mono);font-size:11.5px;padding:5px 12px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:.15s;}
  .unitopt.active{background:var(--volt);color:#0c0d0e;}

  .overall{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px 15px;display:flex;align-items:center;gap:14px;}
  .overall .lab{font-family:var(--display);text-transform:uppercase;letter-spacing:1.5px;font-size:13px;color:var(--muted);white-space:nowrap;}
  .bar{flex:1;height:9px;background:var(--bg2);border-radius:20px;overflow:hidden;border:1px solid var(--line);}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--volt-dim),var(--volt));border-radius:20px;transition:width .5s cubic-bezier(.2,.8,.2,1);}
  .overall .pct{font-family:var(--mono);font-size:14px;color:var(--volt);min-width:42px;text-align:right;}

  .section-lab{font-family:var(--display);text-transform:uppercase;letter-spacing:2px;font-size:12px;color:var(--faint);margin:18px 2px 9px;}
  .weeks{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;}
  .weeks::-webkit-scrollbar{display:none;}
  .week{flex:0 0 auto;min-width:62px;padding:10px 6px 8px;border-radius:12px;cursor:pointer;background:var(--surface);border:1px solid var(--line);text-align:center;transition:.15s;}
  .week .wn{font-family:var(--display);font-weight:600;font-size:11px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;}
  .week .wnum{font-family:var(--display);font-weight:700;font-size:24px;line-height:1;margin-top:2px;}
  .week .wdot{height:4px;border-radius:4px;margin:7px 8px 0;background:var(--line2);transition:.3s;}
  .week:hover{border-color:var(--line2);}
  .week.active{border-color:var(--volt);background:var(--surface2);box-shadow:0 0 0 1px var(--volt),0 6px 18px -8px var(--volt-glow);}
  .week.active .wn{color:var(--volt);}
  .week.done .wdot{background:var(--volt);}

  .days{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .day{padding:12px 4px;border-radius:12px;cursor:pointer;text-align:center;background:var(--surface);border:1px solid var(--line);transition:.15s;}
  .day .dn{font-family:var(--display);font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:12.5px;line-height:1.05;}
  .day .dprog{font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:4px;}
  .day:hover{border-color:var(--line2);}
  .day.active{background:var(--volt);border-color:var(--volt);}
  .day.active .dn{color:#0c0d0e;}
  .day.active .dprog{color:rgba(12,13,14,.6);}

  .panel{margin-top:18px;animation:fade .35s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .blockhead{display:flex;align-items:center;gap:10px;margin:22px 2px 11px;}
  .blockhead h2{font-family:var(--display);text-transform:uppercase;font-size:18px;letter-spacing:2px;font-weight:600;}
  .blockhead h2.band{color:var(--cyan);}
  .blockhead h2.cardio{color:var(--warn);}
  .blockhead .rule{flex:1;height:1px;background:var(--line);}
  .blockhead .tag{font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:1px;}

  .card{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--line2);border-radius:var(--r);padding:13px 14px;margin-bottom:10px;transition:.2s;}
  .card.band{border-left-color:var(--cyan-dim);}
  .card.cardio{border-left-color:var(--warn);}
  .card.done{border-left-color:var(--volt);background:linear-gradient(90deg,var(--volt-glow),transparent 60%),var(--surface);}
  .card{will-change:transform;}
  .card.drop-anim{animation:dropSettle .52s cubic-bezier(.2,.8,.2,1);}
  @keyframes dropSettle{
    0%   { transform: translateY(-14px) scale(1.015); box-shadow: 0 18px 26px -14px rgba(0,0,0,.55); }
    8%   { transform: translateY(-12px) scale(1.015); }
    42%  { transform: translateY(0) scale(1); box-shadow: 0 2px 8px -4px rgba(0,0,0,.3); }
    58%  { transform: translateY(-5px) scale(.997); }
    74%  { transform: translateY(1px) scale(1.002); }
    88%  { transform: translateY(-1.5px) scale(.999); }
    100% { transform: translateY(0) scale(1); box-shadow: none; }
  }
  .card.lift-anim{animation:liftOff .28s ease-out;}
  @keyframes liftOff{
    0%   { transform: translateY(0) scale(1); }
    35%  { transform: translateY(-6px) scale(1.008); }
    100% { transform: translateY(0) scale(1); }
  }
  @media (prefers-reduced-motion: reduce){
    .card.drop-anim, .card.lift-anim{animation:none;}
  }
  .crow{display:flex;align-items:flex-start;gap:12px;}
  .cmain{flex:1;min-width:0;}
  .ename{font-family:var(--display);font-weight:600;font-size:17px;letter-spacing:.4px;line-height:1.15;}
  .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;align-items:center;}
  .badge{font-family:var(--mono);font-size:11px;padding:3px 8px;border-radius:6px;background:var(--bg2);border:1px solid var(--line);color:var(--muted);}
  .badge.tgtedit{display:inline-flex;align-items:center;gap:5px;cursor:pointer;transition:.15s;}
  .badge.tgtedit svg{opacity:.7;}
  .badge.tgtedit:hover{background:var(--volt);color:#0c0d0e;border-color:var(--volt);}
  .badge.tgtedit:hover svg{opacity:1;}
  .badge.tgt{color:var(--volt);border-color:var(--volt-dim);}
  .badge.tgt.band{color:var(--cyan);border-color:var(--cyan-dim);}
  .badge.tgt.cardio{color:var(--warn);border-color:rgba(255,176,58,.4);}
  .badge.base{color:var(--faint);}

  .check{flex-shrink:0;width:34px;height:34px;border-radius:9px;border:2px solid var(--line2);background:var(--bg2);cursor:pointer;display:grid;place-items:center;transition:.15s;}
  .check svg{width:18px;height:18px;stroke:var(--bg2);stroke-width:3.5;fill:none;opacity:0;transform:scale(.5);transition:.2s;}
  .check:active{transform:scale(.9);}
  .card.done .check{background:var(--volt);border-color:var(--volt);}
  .card.done .check svg{opacity:1;transform:scale(1);}

  .inputs{display:grid;grid-template-columns:1fr 90px;gap:8px;margin-top:11px;}
  .inputs.single{grid-template-columns:1fr;}
  .field{display:flex;flex-direction:column;gap:4px;}
  .field.full{grid-column:1/-1;}
  .field label{font-family:var(--display);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--faint);padding-left:2px;}
  .field input{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:9px 10px;color:var(--text);font-family:var(--mono);font-size:13px;transition:.15s;}
  .field input::placeholder{color:var(--faint);}
  .field input:focus{outline:none;border-color:var(--volt-dim);background:#101315;}
  .sets3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .sets2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .avgrow{display:flex;align-items:center;gap:8px;margin-top:2px;padding-left:2px;flex-wrap:wrap;}
  .avglab{font-family:var(--display);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--faint);}
  .avgval{font-family:var(--mono);font-size:13px;color:var(--volt);background:var(--bg2);border:1px solid var(--volt-dim);border-radius:7px;padding:3px 10px;}

  .setchecks{display:flex;flex-wrap:wrap;gap:8px;}
  .setcheck{display:flex;align-items:center;gap:8px;padding:9px 13px 9px 11px;border-radius:10px;background:var(--bg2);border:1px solid var(--line);cursor:pointer;font-family:var(--mono);font-size:12px;color:var(--muted);transition:.15s;user-select:none;}
  .setcheck .box{width:19px;height:19px;border-radius:6px;border:2px solid var(--line2);display:grid;place-items:center;transition:.15s;}
  .setcheck .box svg{width:12px;height:12px;stroke:#0c0d0e;stroke-width:4;fill:none;opacity:0;transition:.15s;}
  .setcheck:hover{border-color:var(--cyan-dim);}
  .setcheck:active{transform:scale(.95);}
  .setcheck.on{border-color:var(--cyan-dim);color:var(--cyan);background:rgba(90,214,224,.08);}
  .setcheck.on .box{background:var(--cyan);border-color:var(--cyan);}
  .setcheck.on .box svg{opacity:1;}

  .sheet.wide{max-width:600px;}
  .chartsel{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:10px;color:var(--text);font-family:var(--mono);font-size:13px;padding:11px 12px;margin-bottom:16px;-webkit-appearance:none;appearance:none;cursor:pointer;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:calc(100% - 18px) 18px,calc(100% - 13px) 18px;background-size:5px 5px,5px 5px;background-repeat:no-repeat;}
  .chartsel:focus{outline:none;border-color:var(--volt-dim);}
  .chartsvg{width:100%;height:auto;display:block;}
  .cgrid{stroke:var(--line);stroke-width:1;}
  .cylab{fill:var(--faint);font-family:var(--mono);font-size:11px;text-anchor:end;}
  .cxlab{fill:var(--muted);font-family:var(--mono);font-size:11px;text-anchor:middle;}
  .cline{fill:none;stroke:var(--volt);stroke-width:2.5;stroke-linejoin:round;stroke-linecap:round;}
  .carea{fill:url(#cgrad);opacity:.18;}
  .cdot{fill:var(--volt);stroke:var(--surface);stroke-width:2;}
  .cval{fill:var(--text);font-family:var(--mono);font-size:10px;text-anchor:middle;}
  .nochart{color:var(--muted);font-family:var(--mono);font-size:13px;text-align:center;padding:46px 14px;line-height:1.7;}
  .cstat{font-family:var(--mono);font-size:13px;color:var(--muted);text-align:center;margin-top:14px;}
  .cstat b{color:var(--text);}
  .cstat .up{color:var(--volt);}
  .cstat .down{color:var(--danger);}

  .iconbtn.active{background:var(--volt);border-color:var(--volt);color:#0c0d0e;}
  .editbar{background:var(--surface2);border:1px dashed var(--volt-dim);border-radius:11px;padding:10px 13px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12px;color:var(--volt);}
  .editbar svg{flex-shrink:0;width:16px;height:16px;stroke:var(--volt);}
  .cardedit{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:92px;}
  .ceditbtn{width:28px;height:28px;border-radius:7px;background:var(--bg2);border:1px solid var(--line2);color:var(--muted);cursor:pointer;display:grid;place-items:center;transition:.15s;}
  .ceditbtn:disabled{opacity:.3;cursor:default;}
  .ceditbtn:disabled:hover{color:var(--muted);border-color:var(--line2);}
  .ceditbtn:hover{color:var(--volt);border-color:var(--volt-dim);}
  .ceditbtn.danger:hover{color:var(--danger);border-color:var(--danger);}
  .renamerow{display:flex;gap:8px;margin-top:11px;}
  .renamerow input{flex:1;background:var(--bg2);border:1px solid var(--volt-dim);border-radius:9px;padding:9px 10px;color:var(--text);font-family:var(--body);font-size:13px;}
  .renamerow input:focus{outline:none;}
  .renamerow button{font-family:var(--display);text-transform:uppercase;font-size:11px;letter-spacing:1px;padding:0 14px;border-radius:9px;border:1px solid var(--line);background:var(--bg2);color:var(--text);cursor:pointer;}
  .renamerow button.go{background:var(--volt);color:#0c0d0e;border-color:var(--volt);}
  .addexbtn{width:100%;border:1.5px dashed var(--line2);background:transparent;color:var(--muted);border-radius:var(--r);padding:13px;font-family:var(--display);text-transform:uppercase;letter-spacing:1.5px;font-size:12.5px;cursor:pointer;transition:.15s;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px;}
  .addexbtn:hover{border-color:var(--volt-dim);color:var(--volt);}
  .addexbtn svg{width:15px;height:15px;}
  .addform{background:var(--surface2);border:1px solid var(--volt-dim);border-radius:var(--r);padding:13px 14px;margin-bottom:10px;display:flex;gap:8px;}
  .addform input{flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:10px 11px;color:var(--text);font-family:var(--body);font-size:13px;}
  .addform input:focus{outline:none;border-color:var(--volt-dim);}
  .addform button{font-family:var(--display);text-transform:uppercase;font-size:11px;letter-spacing:1px;padding:0 16px;border-radius:9px;border:1px solid var(--volt);background:var(--volt);color:#0c0d0e;cursor:pointer;white-space:nowrap;}

  .timerchip{font-family:var(--mono);font-size:11px;background:var(--bg2);border:1px solid var(--line2);color:var(--volt);padding:4px 9px;border-radius:7px;cursor:pointer;transition:.15s;white-space:nowrap;}
  .timerchip:hover{background:var(--volt);color:#0c0d0e;}
  .carrychip{color:var(--cyan);border-color:var(--cyan-dim);}
  .carrychip:hover{background:var(--cyan);color:#0c0d0e;}

  .fab{position:fixed;right:16px;bottom:18px;z-index:30;width:58px;height:58px;border-radius:18px;background:var(--volt);border:none;color:#0c0d0e;font-size:24px;cursor:pointer;box-shadow:0 10px 30px -8px var(--volt-glow),0 6px 16px rgba(0,0,0,.5);display:grid;place-items:center;transition:.18s;}
  .fab:active{transform:scale(.92);}
  .modal{position:fixed;inset:0;z-index:40;background:rgba(8,9,10,.72);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;}
  .modal.open{display:flex;animation:fade .25s;}
  .sheet{width:100%;max-width:480px;background:var(--surface);border:1px solid var(--line);border-radius:22px 22px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));animation:slideup .3s cubic-bezier(.2,.8,.2,1);}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
  .sheet h3{font-family:var(--display);text-transform:uppercase;letter-spacing:2px;font-size:16px;margin-bottom:4px;}
  .sheet .sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
  .clock{font-family:var(--mono);font-weight:700;font-size:62px;text-align:center;letter-spacing:2px;color:var(--volt);line-height:1;margin:6px 0 14px;transition:color .2s;}
  .clock.urgent{color:var(--warn);}
  .clock.done{color:var(--danger);animation:pulse .5s infinite;}
  @keyframes pulse{50%{opacity:.4}}
  .presets{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
  .preset{font-family:var(--mono);font-size:13px;padding:11px 4px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;color:var(--text);cursor:pointer;transition:.15s;}
  .preset:hover{border-color:var(--volt-dim);}
  .preset.active{background:var(--volt);color:#0c0d0e;border-color:var(--volt);}
  .tctrls{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .tbtn{font-family:var(--display);text-transform:uppercase;letter-spacing:1.5px;font-size:15px;padding:14px;border-radius:12px;cursor:pointer;border:1px solid var(--line);transition:.15s;}
  .tbtn.primary{background:var(--volt);color:#0c0d0e;border-color:var(--volt);}
  .tbtn.ghost{background:var(--bg2);color:var(--text);}
  .tbtn:active{transform:scale(.97);}

  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);z-index:50;background:var(--surface2);border:1px solid var(--volt-dim);color:var(--text);padding:10px 18px;border-radius:30px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;font-family:var(--mono);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .savenote{text-align:center;font-size:11px;color:var(--faint);margin-top:28px;font-family:var(--mono);}
  .savenote b{color:var(--volt-dim);}

  @media(max-width:430px){
    .brand h1{font-size:34px;}
    .inputs{grid-template-columns:1fr 78px;}
    .day .dn{font-size:11px;}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="titlebar">
      <div class="brand">
        <h1>Iron<span>·</span>Log</h1>
        <p>4-Day Resistance + Weight Split</p>
      </div>
      <div class="hbtns">
        <div class="menuwrap">

<script>
/* ---------------- PROGRAM DATA (from your sheet) ---------------- */
const STAIR = { name:"Stair Master", type:"cardio", target:"10 min", timer:600 };
const T = 60; // 1-min holds

const PROGRAM = {
  weeks: 8,
  days: [

          { name:"Side Raises", type:"weight", target:"2×10" },
          { name:"Front Raises", type:"weight", target:"2×10" },
          { name:"Shoulder Press (M)", type:"weight", target:"3×10" },
        ]},
        { label:"Cardio", cardio:true, items:[ STAIR ]},
      ]
    },
    { id:"legs", name:"Legs",
      groups:[
        { label:"Resistance", band:true, items:[
          { name:"Pyramid Leg Ups", type:"resistance", target:"3×10", base:"Body" },
        ]},

          { name:"Leg Press", type:"weight", target:"2×10" },

          { name:"Pyramid Pull Ups", type:"resistance", target:"4", base:"Body" },
          { name:"Standing Tricep Ext.", type:"resistance", target:"1 min × 3", base:"60 lb", timer:T },
          { name:"Straight Tricep Ext.", type:"resistance", target:"1 min × 3", base:"60 lb", timer:T },
          { name:"Twister Arm Workouts", type:"resistance", target:"1 min × 3", base:"60 lb", timer:T },
        ]},
        { label:"Weight", items:[
          { name:"DB Tricep Ext.", type:"weight", target:"2×10" },

          { name:"Chest Fly (M)", type:"weight", target:"3×10" },

          { name:"Cable Cross", type:"weight", target:"2×10" },
        ]},
        { label:"Cardio", cardio:true, items:[ STAIR ]},
      ]
    },
  ]
};

/* ---------------- STATE + PERSISTENCE ---------------- */
const STORE_KEY = "ironlog-rw-v2";
const LS_KEY = "ironlog-rw-v2-local";
let storageMode = "none"; // "claude" | "local" | "memory"
let state = { view:{ week:1, day:"bisback" }, log:{}, customItems:{}, removedItems:{}, order:{}, unit:"lb", targetOverrides:{} };
function exKey(dayId, gi, name){ return dayId+"|"+gi+"|"+name; }
function groupKey(dayId, gi){ return dayId+"|"+gi; }

async function loadState(){
  let found=false;
  // Prefer Claude's persistent artifact storage when available
  try{
    if(window.storage && typeof window.storage.get === "function"){
      let res=null;
      try{ res = await window.storage.get(STORE_KEY,false); }catch(e){ res=null; }
      if(res && res.value){ mergeState(JSON.parse(res.value)); found=true; }
      storageMode="claude";
      return found;
    }
  }catch(e){ /* fall through */ }
  // Fall back to the browser's own localStorage (works when the file is opened directly)
  try{
    const raw = window.localStorage.getItem(LS_KEY);
    if(raw){ mergeState(JSON.parse(raw)); found=true; }
    storageMode="local";
  }catch(e){
    storageMode="memory";
  }
  return found;
}
function mergeState(parsed){
  state=Object.assign(state,parsed);
  if(!state.log) state.log={};
  if(!state.view) state.view={week:1,day:"bisback"};
  if(!state.customItems) state.customItems={};
  if(!state.removedItems) state.removedItems={};
  if(!state.order) state.order={};
  if(!state.targetOverrides) state.targetOverrides={};
  if(state.unit!=="kg") state.unit="lb";
}
let saveTimer=null;
function scheduleSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(doSave,350); }
async function doSave(){
  const payload=JSON.stringify(state);
  if(storageMode==="claude"){
    try{ await window.storage.set(STORE_KEY, payload, false); }catch(e){}
  } else if(storageMode==="local"){
    try{ window.localStorage.setItem(LS_KEY, payload); }catch(e){}
  }
  // memory mode: nothing further to do, state already lives in JS memory
}

/* ---------------- LIVE PROGRAM (base + edits) ---------------- */
function liveGroupItems(day, gi, group){
  const gk=groupKey(day.id,gi);
  const removed = state.removedItems[gk] || [];
  const base = group.items.filter(ex => !removed.includes(ex.name));
  const custom = (state.customItems[gk] || []);
  let items = base.concat(custom);

  // Clone so we never mutate the shared PROGRAM template or stored custom objects directly,
  // then apply any saved target (sets×reps / duration) override.
  const tOver = state.targetOverrides[gk] || {};
  items = items.map(ex => tOver[ex.name] ? Object.assign({}, ex, { target: tOver[ex.name] }) : ex);

  const order = state.order[gk];
  if(order && order.length){
    const byName = {}; items.forEach(ex=>{ byName[ex.name]=ex; });
    const ordered = [];
    order.forEach(name=>{ if(byName[name]){ ordered.push(byName[name]); delete byName[name]; } });
    // any items not yet in the saved order (newly added) go at the end, in their natural order
    items.forEach(ex=>{ if(byName[ex.name]){ ordered.push(ex); delete byName[ex.name]; } });
    items = ordered;
  }
  return items;
}
function setTarget(day, gi, group, ex, newTarget){
  newTarget=newTarget.trim();
  if(!newTarget) return false;
  const gk=groupKey(day.id,gi);
  state.targetOverrides[gk] = state.targetOverrides[gk] || {};
  state.targetOverrides[gk][ex.name] = newTarget;
  scheduleSave();
  return true;
}
function moveItem(day, gi, group, name, dir){
  const gk=groupKey(day.id,gi);
  const items = liveGroupItems(day,gi,group);
  const names = items.map(ex=>ex.name);
  const idx = names.indexOf(name);
  const swapIdx = idx + dir;
  if(idx<0 || swapIdx<0 || swapIdx>=names.length) return;
  [names[idx], names[swapIdx]] = [names[swapIdx], names[idx]];
  state.order[gk] = names;
  scheduleSave();
}
function addCustomItem(day, gi, group, name){
  name=name.trim();
  if(!name) return false;
  const gk=groupKey(day.id,gi);
  const existing = liveGroupItems(day,gi,group).some(e=>e.name.toLowerCase()===name.toLowerCase());
  if(existing) return false;
  state.customItems[gk] = state.customItems[gk] || [];
  let ex;
  if(group.band){
    ex = { name, type:"resistance", target:"1 min × 3", custom:true };
  } else if(group.cardio){
    ex = { name, type:"cardio", target:"10 min", custom:true };
  } else {
    ex = { name, type:"weight", target:"3×10", custom:true };
  }
  state.customItems[gk].push(ex);
  scheduleSave();
  return true;
}
function removeItem(day, gi, group, ex){
  const gk=groupKey(day.id,gi);
  if(ex.custom){
    state.customItems[gk] = (state.customItems[gk]||[]).filter(e=>e.name!==ex.name);
  } else {
    state.removedItems[gk] = state.removedItems[gk] || [];
    if(!state.removedItems[gk].includes(ex.name)) state.removedItems[gk].push(ex.name);
  }
  if(state.order[gk]) state.order[gk]=state.order[gk].filter(n=>n!==ex.name);
  if(state.targetOverrides[gk]) delete state.targetOverrides[gk][ex.name];
  scheduleSave();
}
function renameItem(day, gi, group, ex, newName){
  newName=newName.trim();
  if(!newName || newName===ex.name) return false;
  const gk=groupKey(day.id,gi);
  if(ex.custom){
    const item=(state.customItems[gk]||[]).find(e=>e.name===ex.name);
    if(item) item.name=newName;
  } else {
    // substitute: hide original, add a custom item carrying the same type/target/timer
    state.removedItems[gk]=state.removedItems[gk]||[];
    if(!state.removedItems[gk].includes(ex.name)) state.removedItems[gk].push(ex.name);
    state.customItems[gk]=state.customItems[gk]||[];
    state.customItems[gk].push({ name:newName, type:ex.type, target:ex.target, timer:ex.timer, custom:true, subFor:ex.name });
  }
  // carry the position over to the new name so substitutions don't jump to the bottom
  if(state.order[gk]){
    const i=state.order[gk].indexOf(ex.name);
    if(i>=0) state.order[gk][i]=newName; else state.order[gk].push(newName);
  }
  // carry any target override over to the new name too
  if(state.targetOverrides[gk] && state.targetOverrides[gk][ex.name]){
    state.targetOverrides[gk][newName]=state.targetOverrides[gk][ex.name];
    delete state.targetOverrides[gk][ex.name];
  }
  scheduleSave();
  return true;
}
function entry(week, dayId, gi, name){
  const wk=String(week);
  state.log[wk]=state.log[wk]||{};
  const k=exKey(dayId,gi,name);
  if(!state.log[wk][k]) state.log[wk][k]={done:false};
  return state.log[wk][k];
}
function getEntry(week, dayId, gi, name){
  const wk=String(week);
  return (state.log[wk] && state.log[wk][exKey(dayId,gi,name)]) || null;
}

/* ---------------- COMPLETION MATH ---------------- */
function dayTotals(week, day){
  let total=0, done=0;
  day.groups.forEach((g,gi)=>{ liveGroupItems(day,gi,g).forEach(ex=>{
    total++; const en=getEntry(week,day.id,gi,ex.name); if(en&&en.done) done++;
  }); });
  return {total,done};
}
function weekPct(week){ let t=0,d=0; PROGRAM.days.forEach(day=>{const r=dayTotals(week,day);t+=r.total;d+=r.done;}); return t?Math.round(d/t*100):0; }
function overallPct(){ let t=0,d=0; for(let w=1;w<=PROGRAM.weeks;w++){PROGRAM.days.forEach(day=>{const r=dayTotals(w,day);t+=r.total;d+=r.done;});} return t?Math.round(d/t*100):0; }
function findNextWorkout(){
  // First day, in program order, that isn't 100% complete yet.
  for(let w=1; w<=PROGRAM.weeks; w++){
    for(const day of PROGRAM.days){
      const r=dayTotals(w,day);
      if(r.total>0 && r.done<r.total) return { week:w, day:day.id };
    }
  }
  // Everything complete — land on the final day of the final week.
  const lastDay=PROGRAM.days[PROGRAM.days.length-1];
  return { week:PROGRAM.weeks, day:lastDay.id };
}
function goToToday(){
  const t=findNextWorkout();
  state.view.week=t.week; state.view.day=t.day;
  scheduleSave(); renderAll();
  toast("Jumped to next workout");
}

/* ---------------- HELPERS ---------------- */
function setCount(target){
  target=(target||"").toLowerCase().trim();
  let m=target.match(/min\s*[×x]\s*(\d+)/);   // "1 min × 3" -> 3
  if(m) return parseInt(m[1],10);
  m=target.match(/^(\d+)\s*[×x]/);            // "3×10" -> 3
  if(m) return parseInt(m[1],10);
  m=target.match(/^(\d+)$/);                  // "4" -> 4
  if(m) return parseInt(m[1],10);
  return 3;
}
function avgWeightSets(en){
  const vals=[en.w1,en.w2,en.w3].map(v=>(v||"").trim()).filter(Boolean);
  if(!vals.length) return "—";
  const nums=vals.map(v=>{const m=v.match(/-?\d+(\.\d+)?/);return m?parseFloat(m[0]):null;}).filter(n=>n!==null);
  if(nums.length){ const a=lbToDisplay(nums.reduce((x,y)=>x+y,0)/nums.length); return (Math.round(a*10)/10)+" "+unit(); }
  return "—";
}
function avgWeightFromLiveInputs(card){
  const inputs=card.querySelectorAll('input[data-f="w1"],input[data-f="w2"],input[data-f="w3"]');
  const nums=[];
  inputs.forEach(inp=>{
    const m=(inp.value||"").match(/-?\d+(\.\d+)?/);
    if(m) nums.push(parseFloat(m[0]));
  });
  if(!nums.length) return "—";
  const a=nums.reduce((x,y)=>x+y,0)/nums.length;
  return (Math.round(a*10)/10)+" "+unit();
}

/* ---------------- RENDER ---------------- */
const $ = s => document.querySelector(s);
let editMode = false;
/* ---------------- HELPERS ---------------- */
const LB_PER_KG = 2.20462;
function unit(){ return state.unit==="kg" ? "kg" : "lb"; }
function lbToDisplay(lb){
  if(lb==null || isNaN(lb)) return lb;
  return unit()==="kg" ? lb/LB_PER_KG : lb;
}
function displayToLb(val){
  if(val==null || isNaN(val)) return val;
  return unit()==="kg" ? val*LB_PER_KG : val;
}
// Parse a number out of a raw stored string (assumed to be in lb) and
// return it formatted for the currently active display unit, rounded sensibly.
function storedToDisplayStr(raw){
  raw=(raw||"").trim();
  if(!raw) return "";
  const m=raw.match(/-?\d+(\.\d+)?/);
  if(!m) return raw; // non-numeric notes like "Body" pass through untouched
  const lbVal=parseFloat(m[0]);
  const out=lbToDisplay(lbVal);
  const rounded=Math.round(out*10)/10;
  return raw.replace(m[0], String(rounded));
}
// Parse a raw input string the user typed (in the active display unit) and
// return it converted back to lb for storage, preserving non-numeric text.
function displayToStoredStr(raw){
  raw=(raw||"").trim();
  if(!raw) return "";
  const m=raw.match(/-?\d+(\.\d+)?/);
  if(!m) return raw;
  const dispVal=parseFloat(m[0]);
  const lbVal=displayToLb(dispVal);
  const rounded=Math.round(lbVal*10)/10;
  return raw.replace(m[0], String(rounded));
}
function setUnit(u){
  state.unit = u;
  scheduleSave();
  renderPanel(); renderChart_safe();
}
function renderChart_safe(){
  // only re-render the chart if its modal is currently open/built
  if($("#chartModal") && $("#chartModal").classList.contains("open")) renderChart();
}
function checkSVG(){ return `<svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg>`; }

/* Weighted drop-and-settle animation, played once when a card transitions
   into "done" (or a light lift-off when un-checked). Pure CSS keyframes
   triggered via a short-lived class — cheap on battery, no per-frame JS. */
function playDropAnim(card, becameDone){
  const cls = becameDone ? "drop-anim" : "lift-anim";
  const other = becameDone ? "lift-anim" : "drop-anim";
  card.classList.remove(cls, other); // reset in case one is mid-animation already
  void card.offsetWidth; // force reflow so the class re-triggers reliably
  card.classList.add(cls);
  card.addEventListener("animationend", ()=> card.classList.remove(cls), { once:true });
  if(becameDone){ try{ if(navigator.vibrate) navigator.vibrate(18); }catch(e){} }
}

function renderWeeks(){
  const el=$("#weeks"); el.innerHTML="";
  for(let w=1;w<=PROGRAM.weeks;w++){
    const pct=weekPct(w);
    const div=document.createElement("div");
    div.className="week"+(w===state.view.week?" active":"")+(pct===100?" done":"");
    div.innerHTML=`<div class="wn">Week</div><div class="wnum">${w}</div><div class="wdot"></div>`;
    div.onclick=()=>{ state.view.week=w; scheduleSave(); renderAll(); };
    el.appendChild(div);
  }
}
function renderDays(){
  const el=$("#days"); el.innerHTML="";
  PROGRAM.days.forEach(day=>{
    const r=dayTotals(state.view.week,day);
    const div=document.createElement("div");
    div.className="day"+(day.id===state.view.day?" active":"");
    div.innerHTML=`<div class="dn">${day.name}</div><div class="dprog">${r.done}/${r.total}</div>`;
    div.onclick=()=>{ state.view.day=day.id; scheduleSave(); renderPanel(); renderDays(); };
    el.appendChild(div);
  });
}

function exerciseCard(day, gi, group, ex, idx, total){
  const en=entry(state.view.week, day.id, gi, ex.name);
  const card=document.createElement("div");
  const acc = group.band?" band":(group.cardio?" cardio":"");

  const targetBadge = editMode
    ? `<button class="badge tgt${acc} tgtedit" data-act="edittarget" title="Edit sets/reps">${ex.target} <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button>`
    : `<span class="badge tgt${acc}">${ex.target}</span>`;
  const meta=[targetBadge];
  if(ex.base) meta.push(`<span class="badge base">base · ${ex.base}</span>`);
  const timerBtn = ex.timer ? `<span class="timerchip" data-t="${ex.timer}">⏱ ${ex.timer>=60?(ex.timer/60)+"m":ex.timer+"s"}</span>` : "";

  let inputsHTML="", showCornerCheck=true, prevVals=["","",""];

  if(ex.type==="resistance"){
    // max resistance -> no weight, just per-set completion checks
    const n=setCount(ex.target);
    en.sets=Array.isArray(en.sets)?en.sets:[];
    en.done = en.sets.slice(0,n).length===n && en.sets.slice(0,n).every(Boolean) && n>0;
    showCornerCheck=false;
    let pills="";
    for(let i=0;i<n;i++){
      pills+=`<div class="setcheck${en.sets[i]?" on":""}" data-set="${i}">
        <span class="box">${checkSVG()}</span>Set ${i+1}</div>`;
    }
    inputsHTML=`
      <div class="inputs single">
        <div class="field full"><label>Mark each set complete · max resistance</label>
          <div class="setchecks">${pills}</div>
        </div>
        <div class="field full"><label>Notes</label><input type="text" placeholder="how it felt, adjustments…" data-f="notes"></div>
      </div>`;
  } else if(ex.type==="cardio"){
    inputsHTML=`
      <div class="inputs single">
        <div class="field full"><label>Duration</label><input type="text" placeholder="10 min" data-f="duration"></div>
        <div class="field full"><div class="sets2">
          <div class="field"><label>Calories Burned</label><input type="text" inputmode="numeric" placeholder="cal" data-f="calories"></div>

  } else { // weight — three separate per-set inputs + average

    const prevDisp = prevVals.map(v=> v ? storedToDisplayStr(v) : "");
    const hasPrev = prevVals.some(Boolean);
    const hasCurrent = [en.w1,en.w2,en.w3].some(v=>(v||"").trim());
    const carryChip = (hasPrev && !hasCurrent) ? `<span class="timerchip carrychip" data-carry="1">↻ Use last week (${prevDisp.filter(Boolean).join("/")})</span>` : "";
    inputsHTML=`
      <div class="inputs single">
        <div class="field full"><label>Weight per set (${unit()})</label>
          <div class="sets3">
            <input type="text" inputmode="decimal" placeholder="${prevDisp[0]||"set 1"}" data-f="w1">

        <div class="avgrow"><span class="avglab">Avg Weight</span><span class="avgval" data-avg>—</span>${carryChip}</div>
        <div class="field full"><label>Notes</label><input type="text" placeholder="reps, how it felt…" data-f="notes"></div>
      </div>`;
  }

  card.className="card"+acc+(en.done?" done":"");
  const editCtrls = editMode ? `<div class="cardedit">
      <button class="ceditbtn" data-act="up" title="Move up" ${idx===0?"disabled":""}><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>
      <button class="ceditbtn" data-act="down" title="Move down" ${idx===total-1?"disabled":""}><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg></button>
      <button class="ceditbtn" data-act="rename" title="Rename / substitute"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button>
      <button class="ceditbtn danger" data-act="remove" title="Remove"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>
    </div>` : "";
  card.innerHTML=`
    <div class="crow">
      <div class="cmain">
        <div class="ename">${ex.name}</div>
        <div class="meta">${meta.join("")} ${timerBtn}</div>
      </div>
      ${editCtrls}
      ${(!editMode && showCornerCheck)?`<div class="check" role="button" aria-label="mark done">${checkSVG()}</div>`:""}
    </div>

    <div class="renamerow targetrow" style="display:none;">

      <button class="cancel">Cancel</button>
      <button class="go">Save</button>
    </div>
    ${editMode?"":inputsHTML}`;

  // text inputs
  const avgEl=card.querySelector("[data-avg]");
  function refreshAvg(){ if(avgEl) avgEl.textContent=avgWeightSets(en); }
  const isWeightField = f => ex.type==="weight" && (f==="w1"||f==="w2"||f==="w3");
  card.querySelectorAll("input[data-f]").forEach(inp=>{
    const f=inp.getAttribute("data-f");
    inp.value = isWeightField(f) ? storedToDisplayStr(en[f]) : (en[f]||"");
    if(isWeightField(f)){
      // While typing: keep raw display-unit text live for the running average,
      // without mutating storage (avoids corrupting multi-digit entry on every keystroke).
      inp.addEventListener("input",()=>{
        avgEl && (avgEl.textContent = avgWeightFromLiveInputs(card));
      });
      // Only convert + persist once the person finishes editing the field.
      inp.addEventListener("blur",()=>{
        en[f]=displayToStoredStr(inp.value);
        inp.value=storedToDisplayStr(en[f]);
        refreshAvg();
        scheduleSave();
      });
    } else {
      inp.addEventListener("input",()=>{ en[f]=inp.value; scheduleSave(); });
    }
  });
  refreshAvg();

  // resistance set checkboxes
  card.querySelectorAll(".setcheck").forEach(sc=>{
    const i=parseInt(sc.getAttribute("data-set"),10);
    sc.addEventListener("click",()=>{
      en.sets=en.sets||[];
      en.sets[i]=!en.sets[i];
      sc.classList.toggle("on",en.sets[i]);
      const wasDone=en.done;
      const n=setCount(ex.target);
      en.done = en.sets.slice(0,n).length===n && en.sets.slice(0,n).every(Boolean) && n>0;
      card.classList.toggle("done",en.done);
      if(en.done!==wasDone) playDropAnim(card, en.done);
      scheduleSave(); renderWeeks(); renderDays(); updateOverall();
    });
  });

  // corner done check (weight / cardio)
  const chk=card.querySelector(".check");
  if(chk) chk.addEventListener("click",()=>{
    en.done=!en.done;
    card.classList.toggle("done",en.done);
    playDropAnim(card, en.done);
    scheduleSave(); renderWeeks(); renderDays(); updateOverall();
  });

  const tc=card.querySelector(".timerchip[data-t]");
  if(tc) tc.addEventListener("click",()=>openTimer(parseInt(tc.getAttribute("data-t"),10)));

  const carryBtn=card.querySelector(".carrychip");
  if(carryBtn) carryBtn.addEventListener("click",()=>{
    en.w1=prevVals[0]||""; en.w2=prevVals[1]||""; en.w3=prevVals[2]||"";
    renderPanel();
    toast("Copied last week's weights");
  });

  // edit-mode controls
  const upBtn=card.querySelector('[data-act="up"]');
  const downBtn=card.querySelector('[data-act="down"]');
  const renameBtn=card.querySelector('[data-act="rename"]');
  const removeBtn=card.querySelector('[data-act="remove"]');
  const targetBtn=card.querySelector('[data-act="edittarget"]');
  if(upBtn) upBtn.addEventListener("click",()=>{
    moveItem(day,gi,group,ex.name,-1); renderPanel();
  });
  if(downBtn) downBtn.addEventListener("click",()=>{
    moveItem(day,gi,group,ex.name,1); renderPanel();
  });
  const renameRow=card.querySelector(".renamerow:not(.targetrow)");
  const renameInput=renameRow.querySelector("input");
  if(renameBtn) renameBtn.addEventListener("click",()=>{
    renameRow.style.display="flex";
    renameInput.focus(); renameInput.select();
  });
  renameRow.querySelector(".cancel").addEventListener("click",()=>{ renameRow.style.display="none"; });
  renameRow.querySelector(".go").addEventListener("click",()=>{
    const ok=renameItem(day,gi,group,ex,renameInput.value);
    if(ok){ toast("Updated"); renderPanel(); }
    else renameRow.style.display="none";
  });
  renameInput.addEventListener("keydown",e=>{ if(e.key==="Enter") renameRow.querySelector(".go").click(); });
  if(removeBtn) removeBtn.addEventListener("click",()=>{
    if(!confirm(`Remove "${ex.name}" from this block? Logged history for it is kept but it won't show going forward.`)) return;
    removeItem(day,gi,group,ex);
    toast("Removed"); renderPanel(); renderWeeks(); renderDays(); updateOverall();
  });

  const targetRow=card.querySelector(".targetrow");
  const targetInput=targetRow.querySelector("input");
  if(targetBtn) targetBtn.addEventListener("click",()=>{
    targetRow.style.display="flex";
    targetInput.focus(); targetInput.select();
  });
  targetRow.querySelector(".cancel").addEventListener("click",()=>{ targetRow.style.display="none"; });
  targetRow.querySelector(".go").addEventListener("click",()=>{
    const ok=setTarget(day,gi,group,ex,targetInput.value);
    if(ok){ toast("Sets/reps updated"); renderPanel(); renderWeeks(); renderDays(); updateOverall(); }
    else targetRow.style.display="none";
  });
  targetInput.addEventListener("keydown",e=>{ if(e.key==="Enter") targetRow.querySelector(".go").click(); });

  return card;
}

/* ---------------- TIMER ---------------- */
let tDur=60,tRemain=60,tRunning=false,tInterval=null;
let presetVals=[30,60,90,600];
function fmt(s){ const m=Math.floor(s/60),ss=s%60; return m+":"+String(ss).padStart(2,"0"); }
function plab(v){ return v>=60 ? (v%60===0?(v/60)+"m":Math.floor(v/60)+"m"+(v%60)) : v+"s"; }
function paintClock(){
  const c=$("#clock"); c.textContent=fmt(tRemain);
  c.classList.toggle("urgent",tRemain<=5 && tRemain>0 && tRunning);
  c.classList.toggle("done",tRemain===0);
}
function renderPresets(){
  const el=$("#presets"); el.innerHTML="";
  presetVals.slice(0,4).forEach(v=>{
    const b=document.createElement("button");
    b.className="preset"+(v===tDur?" active":"");
    b.textContent=plab(v);
    b.onclick=()=>{ tDur=v;tRemain=v;tRunning=false;stopTick();$("#timerStart").textContent="Start";renderPresets();paintClock(); };
    el.appendChild(b);
  });
}
function stopTick(){ if(tInterval){clearInterval(tInterval);tInterval=null;} }
function tick(){ tRemain--; if(tRemain<=0){tRemain=0;paintClock();finishTimer();return;} paintClock(); }
function startTimer(){
  if(tRunning){ tRunning=false;stopTick();$("#timerStart").textContent="Resume";return; }
  if(tRemain===0) tRemain=tDur;
  tRunning=true;$("#timerStart").textContent="Pause";stopTick();tInterval=setInterval(tick,1000);paintClock();
}
function resetTimer(){ tRunning=false;stopTick();tRemain=tDur;$("#timerStart").textContent="Start";paintClock(); }
function finishTimer(){
  tRunning=false;stopTick();$("#timerStart").textContent="Start";
  try{ if(navigator.vibrate) navigator.vibrate([200,90,200,90,300]); }catch(e){}
  beep(); toast("⏱ Time!");
}
function beep(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    [0,0.18,0.36].forEach(off=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type="sine";o.frequency.value=880;o.connect(g);g.connect(ctx.destination);
      const t=ctx.currentTime+off;
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.3,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.15);
      o.start(t);o.stop(t+0.16);
    });
  }catch(e){}
}
function openTimer(secs){
  if(secs){ tDur=secs;tRemain=secs; if(!presetVals.includes(secs)){ presetVals.unshift(secs); presetVals=presetVals.slice(0,4); } }
  tRunning=false;stopTick();$("#timerStart").textContent="Start";
  renderPresets();paintClock();$("#timerModal").classList.add("open");
}
function closeTimer(){ $("#timerModal").classList.remove("open");tRunning=false;stopTick(); }

/* ---------------- PROGRESS CHART ---------------- */
function weightExercises(){
  const list=[];
  PROGRAM.days.forEach(day=>{
    day.groups.forEach((g,gi)=>{
      liveGroupItems(day,gi,g).forEach(ex=>{
        if(ex.type==="weight") list.push({day:day.name, dayId:day.id, gi, name:ex.name, key:day.id+"|"+gi+"|"+ex.name});
      });
    });
  });
  return list;
}
function avgNumFor(week, dayId, gi, name){
  const en=getEntry(week, dayId, gi, name);
  if(!en) return null;
  const vals=[en.w1,en.w2,en.w3].map(v=>(v||"").trim()).filter(Boolean);
  const nums=vals.map(v=>{const m=v.match(/-?\d+(\.\d+)?/);return m?parseFloat(m[0]):null;}).filter(n=>n!==null);
  if(!nums.length) return null;
  return nums.reduce((a,b)=>a+b,0)/nums.length;
}
function buildSeries(sel){
  const pts=[];
  for(let w=1;w<=PROGRAM.weeks;w++){
    let val=null;
    if(sel==="__all__"){
      const vals=[];
      weightExercises().forEach(e=>{ const v=avgNumFor(w,e.dayId,e.gi,e.name); if(v!=null) vals.push(v); });
      val = vals.length? vals.reduce((a,b)=>a+b,0)/vals.length : null;
    } else {
      const parts=sel.split("|");
      val=avgNumFor(w, parts[0], parseInt(parts[1],10), parts[2]);
    }
    pts.push({week:w, val: val==null?null:Math.round(lbToDisplay(val)*10)/10});
  }
  return pts;
}
function renderChart(){
  const sel=$("#chartSel").value;
  const pts=buildSeries(sel);
  const have=pts.filter(p=>p.val!=null);
  const area=$("#chartArea"), statEl=$("#chartStat");
  if(have.length===0){
    area.innerHTML='<div class="nochart">No weights logged yet for this selection.<br>Fill in some sets and your progression plots here.</div>';
    statEl.textContent=""; return;
  }
  const W=640,H=320,padL=46,padR=18,padT=24,padB=34;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const vals=have.map(p=>p.val);
  let mn=Math.min(...vals), mx=Math.max(...vals);
  if(mn===mx){ mn-=5; mx+=5; } else { const pad=(mx-mn)*0.18; mn-=pad; mx+=pad; }
  mn=Math.max(0,Math.floor(mn)); mx=Math.ceil(mx); if(mx===mn) mx=mn+1;
  const x=w=> padL + plotW*(w-1)/(PROGRAM.weeks-1);
  const y=v=> padT + plotH*(1-(v-mn)/(mx-mn));

  let grid="",yl="";
  const ticks=4;
  for(let i=0;i<=ticks;i++){
    const v=mn+(mx-mn)*i/ticks, yy=y(v);
    grid+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}" class="cgrid"/>`;
    yl+=`<text x="${padL-8}" y="${(yy+4).toFixed(1)}" class="cylab">${Math.round(v)}</text>`;
  }
  let xl="";
  for(let w=1;w<=PROGRAM.weeks;w++) xl+=`<text x="${x(w).toFixed(1)}" y="${H-padB+20}" class="cxlab">W${w}</text>`;

  let line="",area_d="",started=false,firstX=0,lastX=0;
  pts.forEach(p=>{
    if(p.val==null){ started=false; return; }
    const px=x(p.week).toFixed(1), py=y(p.val).toFixed(1);
    line += (started?" L":" M")+px+" "+py;
    if(!started){ firstX=x(p.week); }
    lastX=x(p.week);
    started=true;
  });
  // area fill under the connected line
  if(line){ area_d=`M${firstX.toFixed(1)} ${(H-padB).toFixed(1)} `+line.replace(/^ M/,"L")+` L${lastX.toFixed(1)} ${(H-padB).toFixed(1)} Z`; }

  let dots="";
  pts.forEach(p=>{ if(p.val==null) return;
    dots+=`<circle cx="${x(p.week).toFixed(1)}" cy="${y(p.val).toFixed(1)}" r="4.5" class="cdot"/>`;
    dots+=`<text x="${x(p.week).toFixed(1)}" y="${(y(p.val)-10).toFixed(1)}" class="cval">${p.val}</text>`;
  });

  area.innerHTML=`<svg viewBox="0 0 ${W} ${H}" class="chartsvg" preserveAspectRatio="xMidYMid meet">
    <defs><linearGradient id="cgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(--volt)"/><stop offset="100%" stop-color="var(--volt)" stop-opacity="0"/>
    </linearGradient></defs>
    ${grid}
    ${area_d?`<path d="${area_d}" class="carea"/>`:""}
    <path d="${line}" class="cline"/>
    ${dots}${yl}${xl}
  </svg>`;

  const first=have[0], last=have[have.length-1];
  const diff=Math.round((last.val-first.val)*10)/10;
  const pctp= first.val? Math.round(diff/first.val*1000)/10 : 0;
  const s=diff>0?"+":"";
  if(have.length===1){
    statEl.innerHTML=`Week ${first.week}: <b>${first.val} ${unit()}</b> · log another week to see the trend`;
  } else {
    statEl.innerHTML=`W${first.week} <b>${first.val}</b> → W${last.week} <b>${last.val} ${unit()}</b> &nbsp;·&nbsp; <span class="${diff>=0?'up':'down'}">${s}${diff} ${unit()} (${s}${pctp}%)</span>`;
  }
}
function openChart(){
  let opts='<option value="__all__">All weight lifts · mean</option>';
  weightExercises().forEach(e=>{ opts+=`<option value="${e.key}">${e.day} · ${e.name}</option>`; });
  $("#chartSel").innerHTML=opts;
  renderChart();
  $("#chartModal").classList.add("open");

function loggedSummary(ex,en){
  if(ex.type==="resistance"){
    const n=setCount(ex.target);
    const done=(en.sets||[]).slice(0,n).filter(Boolean).length;
    return done? done+"/"+n+" sets done":"";
  }
  if(ex.type==="cardio"){
    const parts=[];
    if(en.duration) parts.push(en.duration);
    if(en.calories) parts.push(en.calories+" cal");
    if(en.floors) parts.push(en.floors+" floors");
    return parts.join(" · ");
  }
  const sets=[en.w1,en.w2,en.w3].map(v=>(v||"").trim()).filter(Boolean).join(" | ");
  const a=avgWeightSets(en);
  const avgLb = (()=>{ const nums=[en.w1,en.w2,en.w3].map(v=>(v||"").trim()).filter(Boolean).map(v=>{const m=v.match(/-?\d+(\.\d+)?/);return m?parseFloat(m[0]):null;}).filter(n=>n!==null); return nums.length? Math.round(nums.reduce((x,y)=>x+y,0)/nums.length*10)/10 : null; })();
  return sets ? sets+" lb"+(avgLb!=null?"  (avg "+avgLb+" lb)":"") : "";
}
function exportCSV(){
  const rows=[["Week","Day","Section","Exercise","Target","Logged","Notes","Completed"]];
  for(let w=1;w<=PROGRAM.weeks;w++){
    PROGRAM.days.forEach(day=>{
      day.groups.forEach((g,gi)=>{
        liveGroupItems(day,gi,g).forEach(ex=>{
          const en=getEntry(w,day.id,gi,ex.name);
          if(!en) return;
          const summ=loggedSummary(ex,en);
          if(summ || en.notes || en.done){
            rows.push([w,day.name,g.label,ex.name,ex.target,summ,en.notes||"",en.done?"Yes":""]);
          }
        });
      });
    });
  }
  if(rows.length===1){ toast("Nothing logged yet"); return; }
  const csv=rows.map(r=>r.map(c=>{c=String(c);return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"}),url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="ironlog-rw-export.csv";a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1500); toast("Exported CSV ↧");
}
function resetAll(){
  if(!confirm("Reset ALL logged data (weights, checks, notes) for every week? Your added/edited exercises will be kept. This cannot be undone.")) return;
  state.log={}; scheduleSave(); renderAll(); toast("Logged data cleared");
}

let toastT=null;
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1900); }

/* ---------------- INIT ---------------- */
async function init(){
  const foundSavedState = await loadState();
  if(!foundSavedState){
    const t=findNextWorkout(); // brand-new install with no logs yet -> start on Week 1, Day 1 (already the default)
    state.view.week=t.week; state.view.day=t.day;
  }
  if(storageMode==="claude"){
    $("#savenote").innerHTML='Progress saves automatically.';
  } else if(storageMode==="local"){
    $("#savenote").innerHTML='Progress saves automatically to this browser on this device.';
  } else {
    $("#savenote").innerHTML='Storage unavailable in this browser — progress is kept for <b>this session only</b>. Use Export to save your data.';
  }
  renderAll();
  $("#fab").onclick=()=>openTimer(60);
  $("#timerStart").onclick=startTimer;
  $("#timerReset").onclick=resetTimer;
  $("#timerClose").onclick=closeTimer;
  $("#timerModal").addEventListener("click",e=>{ if(e.target.id==="timerModal") closeTimer(); });
  $("#todayBtn").onclick=()=>{ goToToday(); closeMenu(); };
  $("#exportBtn").onclick=()=>{ exportCSV(); closeMenu(); };
  $("#resetBtn").onclick=()=>{ resetAll(); closeMenu(); };
  $("#chartBtn").onclick=()=>{ openChart(); closeMenu(); };
  $("#chartClose").onclick=closeChart;
  $("#chartSel").addEventListener("change",renderChart);
  $("#chartModal").addEventListener("click",e=>{ if(e.target.id==="chartModal") closeChart(); });
  $("#editBtn").onclick=()=>{
    editMode=!editMode;
    $("#editBtn").classList.toggle("active",editMode);
    renderPanel();
    closeMenu();
  };
  $("#menuBtn").onclick=(e)=>{ e.stopPropagation(); toggleMenu(); };
  document.addEventListener("click",(e)=>{
    if(!e.target.closest(".menuwrap")) closeMenu();
  });
  document.querySelectorAll(".unitopt").forEach(btn=>{
    btn.addEventListener("click",(e)=>{
      e.stopPropagation();
      const u=btn.getAttribute("data-u");
      if(u===state.unit) return;
      setUnit(u);
      document.querySelectorAll(".unitopt").forEach(b=>b.classList.toggle("active", b.getAttribute("data-u")===u));
    });
  });
  // reflect the loaded unit preference in the switch UI
  document.querySelectorAll(".unitopt").forEach(b=>b.classList.toggle("active", b.getAttribute("data-u")===unit()));
  renderPresets(); paintClock();
}
function toggleMenu(){ $("#menuDrop").classList.toggle("open"); }
function closeMenu(){ $("#menuDrop").classList.remove("open"); }
init();

// Register service worker for offline support (only works when served over
// HTTPS from a real host, e.g. GitHub Pages — silently no-ops otherwise)
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
